name: Descarga Unica de Fuentes
on: workflow_dispatch 

permissions:
  contents: write

jobs:
  descargar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # CRÍTICO: Le dice a GitHub que se baje todo el historial para poder hacer push sin conflictos

      - name: Ejecutar script
        run: |
          chmod +x download-fonts.sh
          ./download-fonts.sh

           - name: Guardar fuentes en el repo
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@github.com"
          git add .
          git commit -m "Fuentes descargadas mediante script" || echo "Sin cambios"
          git pull --rebase origin main
          git push
